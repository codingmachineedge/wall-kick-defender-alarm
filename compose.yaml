services:
  wall-kick-defender:
    build: .
    image: wall-kick-defender-alarm:local
    container_name: wall-kick-defender
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      PORT: 8080
      WKD_DATA_DIR: /data
    volumes:
      - wall-kick-defender-data:/data

volumes:
  wall-kick-defender-data:
